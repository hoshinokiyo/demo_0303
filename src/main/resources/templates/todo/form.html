<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">
    <h1 class="h3 mb-4">&#12424;&#12390;&#12356;&#12398;&#30331;&#37682;</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="mb-3">
                <span class="text-muted">&#12383;&#12435;&#12392;&#12358;&#65306;</span>
                <span class="fw-semibold" th:text="${currentUser}">&#27597;</span>
            </div>
            <form th:action="@{/todo/confirm}" method="post">
                <div class="mb-3">
                    <label for="title" class="form-label">&#12424;&#12390;&#12356;</label>
                    <input type="text" id="title" name="title" class="form-control" placeholder="&#12420;&#12427;&#12371;&#12392;&#12434;&#12363;&#12356;&#12390;&#12397;" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">&#30906;&#35469;&#30011;&#38754;&#12408;</button>
                    <a th:href="@{/todo}" class="btn btn-outline-secondary">&#25147;&#12427;</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
