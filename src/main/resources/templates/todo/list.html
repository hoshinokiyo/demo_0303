<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show auto-dismiss" role="alert">
        <span th:text="${successMessage}">&#84;&#111;&#68;&#111;&#12434;&#21066;&#38500;&#12375;&#12414;&#12375;&#12383;</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show auto-dismiss" role="alert">
        <span th:text="${errorMessage}">&#21066;&#38500;&#12395;&#22833;&#25943;&#12375;&#12414;&#12375;&#12383;</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo List</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">&#26032;&#35215;&#30331;&#37682;</a>
    </div>

    <div class="card shadow-sm" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">&#84;&#111;&#68;&#111;&#12364;&#12414;&#12384;&#30331;&#37682;&#12373;&#12428;&#12390;&#12356;&#12414;&#12379;&#12435;</h2>
            <p class="text-muted mb-4">&#26368;&#21021;&#12398;&#84;&#111;&#68;&#111;&#12434;&#20316;&#25104;&#12375;&#12390;&#12289;&#12479;&#12473;&#12463;&#31649;&#29702;&#12434;&#22987;&#12417;&#12414;&#12375;&#12423;&#12358;&#12290;</p>
            <a th:href="@{/todo/new}" class="btn btn-primary btn-lg">&#26032;&#35215;&#20316;&#25104;</a>
        </div>
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col" class="text-center" style="width: 80px;">ID</th>
                    <th scope="col">Title</th>
                    <th scope="col" style="width: 160px;">Completed</th>
                    <th scope="col" class="text-center" style="width: 120px;">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td class="text-center" th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">Sample todo</td>
                    <td th:text="${todo.completed} ? '&#23436;&#20102;' : '&#26410;&#23436;&#20102;'">&#26410;&#23436;&#20102;</td>
                    <td class="text-center">
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="m-0"
                              onsubmit="return confirm('&#26412;&#24403;&#12395;&#21066;&#38500;&#12375;&#12414;&#12377;&#12363;&#65311;');">
                            <button type="submit" class="btn btn-danger btn-sm">&#21066;&#38500;</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    setTimeout(function () {
        document.querySelectorAll('.auto-dismiss').forEach(function (alertEl) {
            bootstrap.Alert.getOrCreateInstance(alertEl).close();
        });
    }, 3000);
</script>
</body>
</html>
