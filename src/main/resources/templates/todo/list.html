<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .todo-row-mom > td {
            background-color: #ffdff1 !important;
        }

        .todo-row-dad > td {
            background-color: #ddf1ff !important;
        }

        .todo-row-me > td {
            background-color: #fff6b8 !important;
            color: #111111 !important;
        }

        .todo-row-sis > td {
            background-color: #efe2ff !important;
            color: #111111 !important;
        }

        .todo-row-sis > td:first-child {
            border-left: 4px solid #b58cff;
        }

        .owner-cell {
            font-weight: 700;
        }

        .completed-row > td {
            box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0.38);
        }

        .completed-row > td:not(:last-child) {
            color: #5f6368;
        }

        .todo-title.completed-title {
            text-decoration: line-through;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show auto-dismiss" role="alert">
        <span th:text="${successMessage}">&#84;&#111;&#68;&#111;&#12434;&#21066;&#38500;&#12375;&#12414;&#12375;&#12383;</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show auto-dismiss" role="alert">
        <span th:text="${errorMessage}">&#21066;&#38500;&#12395;&#22833;&#25943;&#12375;&#12414;&#12375;&#12383;</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1">&#12363;&#12382;&#12367;&#12398;ToDo&#12522;&#12473;&#12488;</h1>
            <p class="text-muted mb-0">&#12415;&#12435;&#12394;&#12398;&#20104;&#23450;&#12434;&#12371;&#12371;&#12391;&#35211;&#12425;&#12428;&#12414;&#12377;</p>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h2 class="h6 mb-3">&#12384;&#12428;&#12398;&#20104;&#23450;&#12434;&#12356;&#12428;&#12427;&#65311;</h2>
            <form th:action="@{/todo/new}" method="get" class="d-flex flex-wrap align-items-center gap-3">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="owner" id="ownerMother" value="mom" onchange="this.form.submit()">
                    <label class="form-check-label" for="ownerMother">&#27597;</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="owner" id="ownerFather" value="dad" onchange="this.form.submit()">
                    <label class="form-check-label" for="ownerFather">&#29238;</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="owner" id="ownerMe" value="me" onchange="this.form.submit()">
                    <label class="form-check-label" for="ownerMe">&#20693;</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="owner" id="ownerSister" value="sis" onchange="this.form.submit()">
                    <label class="form-check-label" for="ownerSister">&#22985;</label>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">&#84;&#111;&#68;&#111;&#12364;&#12414;&#12384;&#30331;&#37682;&#12373;&#12428;&#12390;&#12356;&#12414;&#12379;&#12435;</h2>
            <p class="text-muted mb-4">&#26368;&#21021;&#12398;&#84;&#111;&#68;&#111;&#12434;&#20316;&#25104;&#12375;&#12390;&#12289;&#12479;&#12473;&#12463;&#31649;&#29702;&#12434;&#22987;&#12417;&#12414;&#12375;&#12423;&#12358;&#12290;</p>
        </div>
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col" class="text-center" style="width: 120px;">&#25285;&#24403;</th>
                    <th scope="col">&#20104;&#23450;</th>
                    <th scope="col" style="width: 160px;">&#12391;&#12365;&#12383;&#65311;</th>
                    <th scope="col" class="text-center" style="width: 220px;">&#25805;&#20316;</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}"
                    th:classappend="(${todo.currentUser == '母' or todo.currentUser == 'mom'} ? ' todo-row-mom' :
                                    (${todo.currentUser == '父' or todo.currentUser == 'dad'} ? ' todo-row-dad' :
                                    (${todo.currentUser == '僕' or todo.currentUser == 'me'} ? ' todo-row-me' :
                                    (${todo.currentUser == '姉' or todo.currentUser == 'sis' or todo.currentUser == '娱'} ? ' todo-row-sis' : ''))))
                                    + (${todo.completed} ? ' completed-row' : '')">
                    <td class="text-center owner-cell" th:switch="${todo.currentUser}">
                        <span th:case="'mom'">&#27597;</span>
                        <span th:case="'dad'">&#29238;</span>
                        <span th:case="'me'">&#20693;</span>
                        <span th:case="'sis'">&#22985;&#9825;</span>
                        <span th:case="'&#23089;'">&#22985;&#9825;</span>
                        <span th:case="*" th:text="${todo.currentUser}">&#27597;</span>
                    </td>
                    <td>
                        <span class="todo-title"
                              th:classappend="${todo.completed} ? ' completed-title' : ''"
                              th:text="${todo.title}">Sample todo</span>
                    </td>
                    <td th:text="${todo.completed} ? '&#12399;&#12356;' : '&#12414;&#12384;'">&#12414;&#12384;</td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="m-0">
                                <button type="submit" class="btn btn-outline-success btn-sm"
                                        th:text="${todo.completed} ? '&#12414;&#12384;&#12395;&#12418;&#12393;&#12377;' : '&#12391;&#12365;&#12383;'">
                                    &#12391;&#12365;&#12383;
                                </button>
                            </form>
                            <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary btn-sm">&#22793;&#12360;&#12427;</a>
                            <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="m-0"
                                  onsubmit="return confirm('&#12411;&#12435;&#12392;&#12358;&#12395;&#12420;&#12417;&#12427;&#65311;');">
                                <button type="submit" class="btn btn-danger btn-sm">&#12420;&#12417;&#12427;</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    setTimeout(function () {
        document.querySelectorAll('.auto-dismiss').forEach(function (alertEl) {
            bootstrap.Alert.getOrCreateInstance(alertEl).close();
        });
    }, 3000);
</script>
</body>
</html>
