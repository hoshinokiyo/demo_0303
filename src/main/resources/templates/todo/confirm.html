<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Confirm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">
    <h1 class="h3 mb-4">&#30331;&#37682;&#20869;&#23481;&#12398;&#30906;&#35469;</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-header">ToDo</div>
        <div class="card-body">
            <h2 class="h5 card-title mb-0">&#12479;&#12452;&#12488;&#12523;: <span th:text="${title}">sample title</span></h2>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a th:href="@{/todo/complete}" class="btn btn-primary">&#30331;&#37682;</a>
        <a th:href="@{/todo/new}" class="btn btn-outline-secondary">&#25147;&#12427;</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
