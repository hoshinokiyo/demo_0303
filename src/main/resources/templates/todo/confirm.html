<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Confirm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 720px;">
    <h1 class="h3 mb-4">&#30331;&#37682;&#20869;&#23481;&#12398;&#30906;&#35469;</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/todo/complete}" method="post">
                <div class="mb-3">
                    <label for="titleDisplay" class="form-label">Title</label>
                    <input type="text" id="titleDisplay" class="form-control" th:value="${title}" readonly>
                </div>

                <input type="hidden" name="title" th:value="${title}">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">&#30331;&#37682;</button>
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back()">&#25147;&#12427;</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
